<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070d" />
      <stop offset="50%" stop-color="#0c0c16" />
      <stop offset="100%" stop-color="#121220" />
    </linearGradient>
    
    <!-- Cyber Green Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff99" stroke-opacity="0.05" stroke-width="1" />
      <circle cx="40" cy="0" r="1.5" fill="#00ff99" fill-opacity="0.12" />
    </pattern>
  </defs>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Cybersecurity/Network Tech graphics -->
  <!-- Circuit lines -->
  <path d="M 0 50 L 150 50 L 200 100 L 170 130 M 800 200 L 680 200 L 630 150 L 650 130" 
        fill="none" stroke="#00ff99" stroke-opacity="0.15" stroke-width="2" />
  <circle cx="200" cy="100" r="4" fill="#00ff99" fill-opacity="0.6" filter="url(#glow)" />
  <circle cx="170" cy="130" r="3" fill="#00ff99" fill-opacity="0.4" />
  <circle cx="630" cy="150" r="4" fill="#00ff99" fill-opacity="0.6" filter="url(#glow)" />

  <!-- Shield Icon (Cybersecurity theme) -->
  <g transform="translate(680, 70) scale(1.3)" stroke="#00ff99" stroke-width="2" fill="none" stroke-opacity="0.25">
    <!-- Outer Shield -->
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" filter="url(#glow)" stroke-opacity="0.6"/>
    <!-- Lock inside -->
    <rect x="9" y="11" width="6" height="5" rx="1" stroke-opacity="0.4"/>
    <path d="M10 11V9a2 2 0 0 1 4 0v2" stroke-opacity="0.4"/>
  </g>

  <!-- Left decorative terminal detail -->
  <text x="35" y="210" font-family="Courier, monospace" font-size="12" fill="#00ff99" fill-opacity="0.35">
    $ sysctl -w net.ipv4.conf.all.rp_filter=1
  </text>
  <text x="35" y="228" font-family="Courier, monospace" font-size="12" fill="#00ff99" fill-opacity="0.35">
    $ status: SECURE // SEC_LEVEL: HIGH
  </text>

  <!-- Main Text -->
  <g transform="translate(80, 105)">
    <!-- WHOAMI indicator -->
    <text x="0" y="-35" font-family="Courier, monospace" font-size="14" font-weight="bold" fill="#00ff99" letter-spacing="3" filter="url(#glow)">
      $ WHOAMI
    </text>
    
    <!-- Title: Ashwin Balaji -->
    <text x="0" y="15" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="1">
      Ashwin Balaji
    </text>
    
    <!-- Subtitle: Cybersecurity & Cloud Security -->
    <text x="2" y="45" font-family="Courier, monospace" font-size="16" font-weight="bold" fill="#00ff99" letter-spacing="4" fill-opacity="0.9">
      Defensive Security &amp; Cloud Architect
    </text>

    <!-- Accent line -->
    <line x1="2" y1="58" x2="180" y2="58" stroke="#00ff99" stroke-width="3" filter="url(#glow)" />
  </g>
</svg>
